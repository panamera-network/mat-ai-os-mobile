<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E1B4B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mGradApp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <filter id="iconGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#A855F7" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)"/>
  <rect x="8" y="8" width="496" height="496" rx="112" fill="none" stroke="url(#mGradApp)" stroke-width="2" opacity="0.3"/>
  <g transform="translate(156, 156)" filter="url(#iconGlow)">
    <circle cx="100" cy="100" r="90" fill="none" stroke="url(#mGradApp)" stroke-width="1" opacity="0.2"/>
    <path d="M30 170 L30 70 L70 120 L70 170" fill="none" stroke="url(#mGradApp)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>
    <path d="M170 170 L170 70 L130 120 L130 170" fill="none" stroke="url(#mGradApp)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>
    <path d="M70 120 L100 80 L130 120" fill="none" stroke="url(#mGradApp)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>
    <path d="M70 120 L100 80 L130 120" fill="none" stroke="#22D3EE" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>
  <text x="256" y="440" text-anchor="middle" font-family="Inter, sans-serif" font-size="28" font-weight="600" fill="#94A3B8" letter-spacing="4">MAT.AI</text>
</svg>
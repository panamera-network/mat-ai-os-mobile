<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E1B4B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bannerM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <filter id="bannerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="200" rx="24" fill="url(#bannerBg)"/>
  <g opacity="0.05">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="200" stroke="#fff" stroke-width="1"/>
  </g>
  <g transform="translate(60, 50)" filter="url(#bannerGlow)">
    <path d="M10 90 L10 30 L40 65 L40 90" fill="none" stroke="url(#bannerM)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M90 90 L90 30 L60 65 L60 90" fill="none" stroke="url(#bannerM)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M40 65 L50 50 L60 65" fill="none" stroke="url(#bannerM)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M40 65 L50 50 L60 65" fill="none" stroke="#22D3EE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>
  <text x="180" y="95" font-family="Inter, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#FFFFFF" letter-spacing="-2">MAT<tspan fill="#A855F7">.</tspan><tspan fill="#6366F1">A</tspan><tspan fill="#06B6D4">I</tspan></text>
  <text x="180" y="130" font-family="Inter, sans-serif" font-size="18" font-weight="400" fill="#94A3B8" letter-spacing="1">One Brain. Infinite Skills. Human in Control.</text>
  <rect x="680" y="20" width="90" height="32" rx="16" fill="rgba(168,85,247,0.15)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="725" y="42" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#A855F7">OS v1.0</text>
</svg>